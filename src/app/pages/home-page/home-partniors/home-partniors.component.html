<section class="partners">
  <div class="container">
    <div class="partners__inner">
      <div class="partners__header">
        <h2 class="partners__title">ჩვენი პარტნიორები</h2>
      </div>

      <div class="partners__slider">
        <div class="partners__viewport">
          <div class="partners__track" [style.transform]="trackTransform">
            <div class="partners__slide" *ngFor="let slide of slides">
              <div class="partners__slide-grid">
                <article class="partners__slider-card" *ngFor="let review of slide">
                  <img class="partners__slider-background" src="icons/quotes.png" alt="" aria-hidden="true">

                  <div class="slider__card-content">
                    <h3 class="slider__card-title">{{ review.company }}</h3>
                    <p class="slider__card-subtitle">{{ review.quote }}</p>
                  </div>

                  <div class="slider__card-bottom">
                    <div class="slider__card-bottom-icon">
                      <img src="icons/quotes.png" alt="" aria-hidden="true">
                    </div>
                    <div class="slider__card-bottom-title">
                      {{ review.author }}
                    </div>
                  </div>
                </article>
              </div>
            </div>
          </div>
        </div>

        <div class="partners__mobile-scroller">
          <article class="partners__slider-card partners__slider-card--mobile" *ngFor="let review of reviews">
            <img class="partners__slider-background" src="icons/quotes.png" alt="" aria-hidden="true">

            <div class="slider__card-content">
              <h3 class="slider__card-title">{{ review.company }}</h3>
              <p class="slider__card-subtitle">{{ review.quote }}</p>
            </div>

            <div class="slider__card-bottom">
              <div class="slider__card-bottom-icon">
                <img src="icons/quotes.png" alt="" aria-hidden="true">
              </div>
              <div class="slider__card-bottom-title">
                {{ review.author }}
              </div>
            </div>
          </article>
        </div>

        <div class="slider__controls" *ngIf="slides.length > 1">
          <div class="slider__dots">
            <button
              type="button"
              class="slider__dot"
              *ngFor="let slide of slides; let index = index"
              [class.slider__dot--active]="index === currentSlide"
              [attr.aria-label]="'Go to slide ' + (index + 1)"
              (click)="goToSlide(index)">
            </button>
          </div>
        </div>
      </div>

      <div class="partners__marquee">
        <div class="partners__marquee-track">
          <ul class="partners__list" aria-hidden="true">
            <li class="partners__list-item" *ngFor="let logo of partnerLogos">
              <img [src]="logo.src" [alt]="logo.alt">
            </li>
          </ul>

          <ul class="partners__list" aria-hidden="true">
            <li class="partners__list-item" *ngFor="let logo of partnerLogos">
              <img [src]="logo.src" [alt]="logo.alt">
            </li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</section>
